name: Notify docs of Viewer updates

on:
  push:
    branches:
      - main
    paths:
      - viewer/**
  workflow_dispatch:

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Dispatch docs deployment
        env:
          DOCS_DISPATCH_TOKEN: ${{ secrets.DOCS_DISPATCH_TOKEN }}
          VIEWER_SHA: ${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "$DOCS_DISPATCH_TOKEN" ]]; then
            echo "Repository secret DOCS_DISPATCH_TOKEN is required." >&2
            exit 1
          fi

          payload=$(jq -n --arg sha "$VIEWER_SHA" '{
            event_type: "task-progress-viewer-updated",
            client_payload: { sha: $sha }
          }')

          curl --fail-with-body --location \
            --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $DOCS_DISPATCH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/Yu5h1/docs/dispatches \
            --data "$payload"
